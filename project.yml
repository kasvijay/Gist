name: Gist
options:
  bundleIdPrefix: com.vijaykas
  deploymentTarget:
    macOS: "14.2"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: "0.13.0"
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    revision: "8c9dd6391139242261bcf27d253c326f9cf2d567"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ARCHS: arm64
    EXCLUDED_ARCHS[sdk=macosx*]: x86_64

targets:
  Gist:
    type: application
    platform: macOS
    sources:
      - path: Gist
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: WhisperKit
      - package: FluidAudio
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vijaykas.gist
        MARKETING_VERSION: "0.2.1"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Gist/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: "Gist"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        CODE_SIGN_ENTITLEMENTS: Gist/Gist.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""

  GistTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: GistTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: Gist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vijaykas.gist.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""

schemes:
  Gist:
    build:
      targets:
        Gist: all
        GistTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GistTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
